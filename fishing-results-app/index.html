<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釣果報告システム - BORIJIN FESTIVAL</title>
    <link rel="stylesheet" href="style.css?v=1.0.5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay">
            <div class="spinner"></div>
            <p>同期中...</p>
        </div>

        <!-- Auth View -->
        <section id="auth-view" class="view active">
            <div class="glass-card auth-card">
                <div class="auth-header">
                    <div class="logo">🎣</div>
                    <h1>釣果報告システム</h1>
                    <p>イケスリーダー・スタッフ専用</p>
                </div>
                <div class="form-group">
                    <label for="login-ikesu-id">イケスを選択</label>
                    <select id="login-ikesu-id">
                        <option value="" disabled selected>イケスを選択してください</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ikesu-passcode">暗証番号</label>
                    <input type="tel" id="ikesu-passcode" maxlength="8" placeholder="••••" autocomplete="off">
                </div>
                <div id="auth-error" class="error-message hidden">イケス名または暗証番号が正しくありません</div>
                <button id="login-btn" class="btn-primary btn-large">ログイン</button>
            </div>
        </section>

        <!-- Admin View (Global Aggregation) -->
        <section id="admin-view" class="view hidden">
            <header class="app-header">
                <div class="header-left">
                    <span class="pond-badge admin">管理者</span>
                    <h2>全体集計・修正</h2>
                </div>
                <button class="btn-icon-text logout-btn">
                    <span>ログアウト</span>
                </button>
            </header>
            <main class="scroll-area">
                <div class="admin-stats glass-card">
                <div class="stat-item">
                    <label>全体合計</label>
                    <div id="admin-total-points" class="stat-value">0<span>pt</span></div>
                </div>
                <div class="stat-item">
                    <label>マダイ等</label>
                    <div id="admin-total-cA" class="stat-value">0<span>尾</span></div>
                </div>
                <div class="stat-item">
                    <label>青物、クエ</label>
                    <div id="admin-total-cB" class="stat-value">0<span>尾</span></div>
                </div>
            </div>

            <!-- 釣果提出＆確認ステータス -->
            <div class="status-cards-container" style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <div class="status-card" style="flex: 1; min-width: 200px; background: #fff; border: 2px solid #93c5fd; border-radius: 12px; padding: 1rem; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                    <div style="font-size: 0.9rem; font-weight: bold; color: #1e3a8a; margin-bottom: 0.5rem;">釣果入力済 イケス</div>
                    <div style="display: flex; align-items: baseline; justify-content: center; gap: 4px;">
                        <span id="status-reported" style="font-size: 2.2rem; font-weight: 900; color: #2563eb; line-height: 1;">0</span>
                        <span style="font-size: 1.1rem; color: #64748b; font-weight: bold;">/ <span id="status-total-ikesu">0</span></span>
                    </div>
                </div>
                <div class="status-card" style="flex: 1; min-width: 200px; background: #fff; border: 2px solid #6ee7b7; border-radius: 12px; padding: 1rem; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                    <div style="font-size: 0.9rem; font-weight: bold; color: #064e3b; margin-bottom: 0.5rem;">運営チェック済 イケス</div>
                    <div style="display: flex; align-items: baseline; justify-content: center; gap: 4px;">
                        <span id="status-verified" style="font-size: 2.2rem; font-weight: 900; color: #059669; line-height: 1;">0</span>
                        <span style="font-size: 1.1rem; color: #64748b; font-weight: bold;">/ <span id="status-total-ikesu-v">0</span></span>
                    </div>
                </div>
            </div>

            <!-- 設定エリア (2カラム) -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                <div class="card glass-card" style="margin: 0; display: flex; flex-direction: column;">
                    <div class="card-header" style="border-bottom: 1px solid #e2e8f0; padding-bottom: 0.8rem; margin-bottom: 0;">
                        <h3 style="font-size: 1.1rem; color: #475569;">🏆 ランキング・入賞設定</h3>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1.2rem; flex: 1; padding: 1.2rem;">
                        <div>
                            <label style="display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 0.3rem;">表彰対象（上位何名）</label>
                            <input type="number" id="rank-top-count" value="3" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                        </div>
                        <div>
                            <label style="display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 0.3rem;">飛び賞（例: 5,10,15... カンマ区切り）</label>
                            <input type="text" id="rank-tobi-list" value="5,10,15,20,25,30" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                        </div>
                        <div style="margin-top: auto;">
                            <button class="btn-primary" onclick="saveRankingSettings()" style="width: 100%; background: #059669; box-shadow: 0 4px 6px -1px rgba(5,150,105,0.2);">設定を保存</button>
                        </div>
                    </div>
                </div>

                <div class="card glass-card" style="margin: 0; border: 1px solid #fee2e2; border-top: 4px solid #ef4444; display: flex; flex-direction: column;">
                    <div class="card-header" style="border-bottom: 1px solid #fee2e2; padding-bottom: 0.8rem; margin-bottom: 0;">
                        <h3 style="font-size: 1.1rem; color:#ef4444;">⚙️ テストデータ管理</h3>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem; flex: 1; justify-content: center; padding: 1.2rem;">
                        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem;">※釣果の動作テスト用機能です。本番運用中は触らないでください。</p>
                        <button class="btn-outline" onclick="generateMockCatchData()" style="border-color:#3b82f6; color:#3b82f6; font-weight: bold; width: 100%; padding: 0.8rem;">🎲 仮釣果データ生成</button>
                        <button class="btn-outline" onclick="clearCatchData()" style="border-color:#ef4444; color:#ef4444; font-weight: bold; width: 100%; padding: 0.8rem;">🗑️ 釣果データ完全リセット</button>
                    </div>
                </div>
            </div>

            <div class="ikesu-grid" id="admin-ikesu-list">
                <!-- Ikesu cards will be injected here -->
            </div>
            </main>
        </section>

        <!-- Main View (Pond Selection / Participant List) -->
        <section id="main-view" class="view hidden">
            <header class="app-header">
                <div class="header-left">
                    <span id="display-ikesu-name" class="pond-badge">--</span>
                    <h2 id="app-title">釣果記録</h2>
                </div>
                <div class="header-right">
                    <button id="admin-back-btn" class="btn-icon-text hidden" onclick="showAdminDashboard()">
                        <span>戻る(管理者)</span>
                    </button>
                    <button id="logout-btn" class="btn-icon-text logout-btn">
                        <span>ログアウト</span>
                    </button>
                </div>
            </header>

            <main class="scroll-area">
                <div style="text-align: right; padding: 0.5rem 0.5rem 0.5rem 0;">
                    <span style="color: #e11d48; font-weight: 900; font-size: 1.1rem; border: 2px solid #e11d48; padding: 2px 6px; border-radius: 4px; background: #fff0f2;">※匹数で入力</span>
                </div>
                <div id="participant-list" class="participant-grid">
                    <!-- Dynamic Content -->
                </div>
            </main>

            <footer class="app-footer">
                <div class="footer-stats">
                    <div class="stat-item">
                        <span class="stat-label">イケス合計</span>
                        <span id="ikesu-total-points" class="stat-value">0</span>
                        <span class="stat-unit">pt</span>
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <div id="admin-verify-container" class="hidden"></div>
                    <button id="save-btn" class="btn-primary">
                        <span class="icon">💾</span> 変更を保存
                    </button>
                </div>
            </footer>
        </section>

<!-- Modal system deprecated in v1.2.0 -->

    </div>

    <div id="toast-container"></div>
    <script src="script.js?v=1.0.9"></script>
</body>
</html>
