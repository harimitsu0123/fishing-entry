<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大会終了後アンケート</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .survey-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .survey-header h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .survey-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .radio-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
            background: #f8fafc;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }
        .radio-label:hover {
            background: #f1f5f9;
        }
        .radio-label input[type="radio"] {
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 id="app-title">BORIJIN FESTIVAL in 水宝 2026</h1>
        </div>
    </nav>

    <main class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="survey-header">
                <h2>📝 大会終了後アンケート</h2>
                <p>本日はご参加いただきありがとうございました。<br>今後のイベント運営の参考とするため、アンケートにご協力をお願いいたします。</p>
            </div>

            <div id="loading-spinner" style="display: none; text-align: center; padding: 2rem;">
                <div class="spinner" style="border: 4px solid rgba(0, 91, 181, 0.1); border-top: 4px solid #005bb5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                <p style="margin-top: 1rem; color: #5a6a7a; font-weight: bold;">送信中...</p>
            </div>

            <form id="survey-form">
                <div class="alert" style="background:#fff3cd; border:1px solid #ffeeba; color:#856404; padding:15px; border-radius:8px; margin-bottom:1.5rem; font-size:0.9rem; line-height:1.5;">
                    <strong>🎁 抽選で10名様に500円分WEBクーポンをプレゼント！</strong><br>
                    ご回答いただいた方の中から抽選で、ハリミツWEBショップで使える500円分のクーポンをプレゼントいたします！<br>
                    <span style="color:#d9534f; font-weight:bold;">※WEBショップの会員登録（必須）と同じ「お名前」と「メールアドレス」をご入力ください。</span>
                </div>

                <div class="form-group">
                    <label for="participant-name">お名前 <span class="required">(※必須)</span></label>
                    <input type="text" id="participant-name" required placeholder="例：山田 太郎">
                </div>
                
                <div class="form-group">
                    <label for="participant-tel">電話番号 <span class="required">(※必須)</span></label>
                    <input type="tel" id="participant-tel" required placeholder="例：090-1234-5678">
                </div>

                <div class="form-group">
                    <label for="participant-email">メールアドレス <span class="required">(※必須)</span></label>
                    <input type="email" id="participant-email" required placeholder="例：example@harimitsu.co.jp">
                </div>

                <hr style="margin: 2rem 0; border: none; border-top: 1px dashed #cbd5e1;">

                <div class="form-group">
                    <label>今回の大会の総合的な満足度を教えてください <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label" style="flex-direction:column; gap:0.2rem; font-size:0.8rem;"><input type="radio" name="satisfaction" value="5" required> <span style="color:#eab308; font-size:1.2rem;">★★★★★</span><br>大変満足</label>
                        <label class="radio-label" style="flex-direction:column; gap:0.2rem; font-size:0.8rem;"><input type="radio" name="satisfaction" value="4"> <span style="color:#eab308; font-size:1.2rem;">★★★★☆</span><br>満足</label>
                        <label class="radio-label" style="flex-direction:column; gap:0.2rem; font-size:0.8rem;"><input type="radio" name="satisfaction" value="3"> <span style="color:#eab308; font-size:1.2rem;">★★★☆☆</span><br>普通</label>
                        <label class="radio-label" style="flex-direction:column; gap:0.2rem; font-size:0.8rem;"><input type="radio" name="satisfaction" value="2"> <span style="color:#eab308; font-size:1.2rem;">★★☆☆☆</span><br>やや不満</label>
                        <label class="radio-label" style="flex-direction:column; gap:0.2rem; font-size:0.8rem;"><input type="radio" name="satisfaction" value="1"> <span style="color:#eab308; font-size:1.2rem;">★☆☆☆☆</span><br>不満</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>本日の釣果はいかがでしたか？ <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="catch-result" value="大満足" required> 大満足！</label>
                        <label class="radio-label"><input type="radio" name="catch-result" value="まあまあ"> まあまあ</label>
                        <label class="radio-label"><input type="radio" name="catch-result" value="厳しかった"> 厳しかった</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>大会前の案内や、当日の運営・ルール説明は分かりやすかったですか？ <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="operations-score" value="とても分かりやすかった" required> とても分かりやすかった</label>
                        <label class="radio-label"><input type="radio" name="operations-score" value="分かりやすかった"> 分かりやすかった</label>
                        <label class="radio-label"><input type="radio" name="operations-score" value="普通"> 普通</label>
                        <label class="radio-label"><input type="radio" name="operations-score" value="分かりにくかった"> 分かりにくかった</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>ボリフェス（ハリミツイベント）への参加は何回目ですか？ <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="participation-count" value="今回が初めて" required> 今回が初めて</label>
                        <label class="radio-label"><input type="radio" name="participation-count" value="2回目"> 2回目</label>
                        <label class="radio-label"><input type="radio" name="participation-count" value="3回以上"> 3回以上</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="favorite-product">ハリミツ製品で一番よく使っている（お気に入りの）アイテムがあれば教えてください <span class="text-muted" style="font-size: 0.8rem; font-weight: normal;">(※任意)</span></label>
                    <input type="text" id="favorite-product" placeholder="例：墨族、海上釣堀シリーズ など">
                </div>

                <div class="form-group">
                    <label>本日の「試釣会（新製品の試し釣りなど）」には参加されましたか？ <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="test-event" value="はい" required> はい</label>
                        <label class="radio-label"><input type="radio" name="test-event" value="いいえ"> いいえ</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="test-event-comments">試釣会の感想や、今後試してみたい製品があれば教えてください <span class="text-muted" style="font-size: 0.8rem; font-weight: normal;">(※任意)</span></label>
                    <textarea id="test-event-comments" rows="3" placeholder="試釣会の感想をご自由にご記入ください。"></textarea>
                </div>

                <div class="form-group">
                    <label>次回もこのような大会があれば参加したいですか？ <span class="required">(※必須)</span></label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="next-time" value="はい" required> はい</label>
                        <label class="radio-label"><input type="radio" name="next-time" value="いいえ"> いいえ</label>
                        <label class="radio-label"><input type="radio" name="next-time" value="わからない"> わからない</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comments">イベント運営やルールについてのご意見・ご要望 <span class="text-muted" style="font-size: 0.8rem; font-weight: normal;">(※任意)</span></label>
                    <textarea id="comments" rows="4" placeholder="良かった点や、改善してほしい点などご自由にご記入ください。"></textarea>
                </div>

                <div class="form-actions" style="margin-top: 2rem;">
                    <button type="submit" class="btn-primary btn-large w-100" style="width: 100%;">アンケートを送信する</button>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykDT-XvGhrZCQcCp_gCxZAToW3X4s_g_BPX7LBO4E-A84vUY0VE3nlqehITFOfp9f9/exec";

        document.getElementById('survey-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const participantName = document.getElementById('participant-name').value;
            const participantTel = document.getElementById('participant-tel').value;
            const participantEmail = document.getElementById('participant-email').value;
            
            const satisfaction = document.querySelector('input[name="satisfaction"]:checked')?.value || '';
            const catchResult = document.querySelector('input[name="catch-result"]:checked')?.value || '';
            const operationsScore = document.querySelector('input[name="operations-score"]:checked')?.value || '';
            const participationCount = document.querySelector('input[name="participation-count"]:checked')?.value || '';
            const favoriteProduct = document.getElementById('favorite-product').value;
            const testEventParticipation = document.querySelector('input[name="test-event"]:checked')?.value || '';
            const testEventComments = document.getElementById('test-event-comments').value;
            const nextTime = document.querySelector('input[name="next-time"]:checked')?.value || '';
            const comments = document.getElementById('comments').value;
            
            const payload = {
                action: 'submit_survey',
                data: { 
                    participantName, participantTel, participantEmail, 
                    catchResult, satisfaction, operationsScore, participationCount,
                    favoriteProduct, testEventParticipation, testEventComments,
                    nextTime, comments 
                }
            };

            const form = document.getElementById('survey-form');
            const spinner = document.getElementById('loading-spinner');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            form.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                
                alert('アンケートにご協力いただき、誠にありがとうございました！');
                form.reset();
            } catch (err) {
                console.error(err);
                alert('送信に失敗しました。時間をおいて再度お試しください。');
            } finally {
                submitBtn.disabled = false;
                form.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
