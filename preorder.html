<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>試釣会商品 予約フォーム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .preorder-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .preorder-header h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .preorder-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 id="app-title">BORIJIN FESTIVAL in 水宝 2026</h1>
        </div>
    </nav>

    <main class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="preorder-header">
                <h2>🎣 試釣会商品 予約フォーム</h2>
                <p>ご希望の商品を事前予約し、指定の店舗にてお受け取り（ご購入）いただけます。</p>
            </div>

            <div id="loading-spinner" style="display: none; text-align: center; padding: 2rem;">
                <div class="spinner" style="border: 4px solid rgba(0, 91, 181, 0.1); border-top: 4px solid #005bb5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                <p style="margin-top: 1rem; color: #5a6a7a; font-weight: bold;">送信中...</p>
            </div>

            <form id="preorder-form">
                <div class="form-group">
                    <label for="store-name">受取（購入）店舗 <span class="required">(※必須)</span></label>
                    <p class="text-muted small mb-1" style="font-size: 0.8rem; margin-bottom: 0.5rem; color: #e67e22;">※チェーン店の場合は、必ず「○○店」までご記入ください。</p>
                    <input type="text" id="store-name" required placeholder="例：釣具のポイント 〇〇店">
                </div>
                
                <div class="form-group">
                    <label for="customer-name">お名前 <span class="required">(※必須)</span></label>
                    <input type="text" id="customer-name" required placeholder="例：山田 太郎">
                </div>

                <div class="form-group">
                    <label for="customer-phone">電話番号 <span class="required">(※必須)</span></label>
                    <input type="tel" id="customer-phone" required placeholder="090-0000-0000">
                </div>

                <div class="form-group">
                    <label for="customer-email">メールアドレス <span class="required">(※必須)</span></label>
                    <input type="email" id="customer-email" required placeholder="例：example@harimitsu.co.jp">
                </div>

                <div class="form-group">
                    <label>ご予約商品・数量 <span class="required">(※必須)</span></label>
                    <p class="text-muted small mb-2" style="font-size: 0.8rem;">ご希望の商品の数量を入力してください（※商品名は仮のものです）</p>
                    
                    <div class="item-list" style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <div class="item-row" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-weight: 600; flex: 1;">商品名1（後日差し替え）</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" min="0" value="0" style="width: 70px; padding: 0.4rem; text-align: right;">
                                <span>個</span>
                            </div>
                        </div>
                        <div class="item-row" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-weight: 600; flex: 1;">商品名2（後日差し替え）</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" min="0" value="0" style="width: 70px; padding: 0.4rem; text-align: right;">
                                <span>個</span>
                            </div>
                        </div>
                        <div class="item-row" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-weight: 600; flex: 1;">商品名3（後日差し替え）</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" min="0" value="0" style="width: 70px; padding: 0.4rem; text-align: right;">
                                <span>個</span>
                            </div>
                        </div>
                        <div class="item-row" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-weight: 600; flex: 1;">商品名4（後日差し替え）</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" min="0" value="0" style="width: 70px; padding: 0.4rem; text-align: right;">
                                <span>個</span>
                            </div>
                        </div>
                        <div class="item-row" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 0.8rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                            <span style="font-weight: 600; flex: 1;">商品名5（後日差し替え）</span>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <input type="number" min="0" value="0" style="width: 70px; padding: 0.4rem; text-align: right;">
                                <span>個</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 2rem;">
                    <button type="submit" class="btn-primary btn-large w-100" style="width: 100%;">予約を申し込む</button>
                </div>
            </form>
        </div>
    </main>
    
    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykDT-XvGhrZCQcCp_gCxZAToW3X4s_g_BPX7LBO4E-A84vUY0VE3nlqehITFOfp9f9/exec";

        document.getElementById('preorder-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const storeName = document.getElementById('store-name').value;
            const customerName = document.getElementById('customer-name').value;
            const customerPhone = document.getElementById('customer-phone').value;
            const customerEmail = document.getElementById('customer-email').value;
            
            // Get item quantities
            const items = [];
            document.querySelectorAll('.item-row').forEach((row, idx) => {
                const itemName = row.querySelector('span').textContent;
                const qty = parseInt(row.querySelector('input').value, 10) || 0;
                if (qty > 0) {
                    items.push({ name: itemName, quantity: qty });
                }
            });
            
            if (items.length === 0) {
                alert("1つ以上の商品の数量を入力してください。");
                return;
            }

            const payload = {
                action: 'submit_preorder',
                data: { storeName, customerName, customerPhone, customerEmail, items }
            };

            const form = document.getElementById('preorder-form');
            const spinner = document.getElementById('loading-spinner');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            form.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                
                alert('ご予約を受け付けました。ご指定の店舗にてお待ちしております。');
                form.reset();
            } catch (err) {
                console.error(err);
                alert('送信に失敗しました。時間をおいて再度お試しください。');
            } finally {
                submitBtn.disabled = false;
                form.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
